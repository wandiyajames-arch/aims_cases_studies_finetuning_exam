# Template. Students must generate and adapt configs/wolof_training_config.yml.
# Ratios are decimal fractions: 0.05 means 5%.

seed: 42

splits:
  train_ratio: 0.90
  validation_ratio: 0.05
  eval_ratio: 0.05
  split_policy: stratified_by_source

model:
  model_choice: qwen
  base_model: Qwen/Qwen3-0.6B
  resource_constraint: small_open_model_for_limited_compute

training:
  epochs: 3
  batch_size: 1
  grad_accum: 8
  max_seq_length: 1024
  learning_rate: 0.0001
  warmup_steps: 50
  weight_decay: 0.01
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  logging_steps: 10
  save_steps: 100
  save_total_limit: 5
  eval_steps: 100

data_sources:
  - name: aya
    description: "Public Wolof instruction/translation source"
    raw_path: data/wolof_aya.jsonl
    chat_path: data/chat_aya.json
    default_category: language

  - name: soynade
    description: "Wolof orthography normalization source"
    raw_path: data/wolof_soynade.jsonl
    chat_path: data/chat_soynade.json
    default_category: orthography

  - name: synth
    description: "Synthetic/local classroom data"
    raw_path: data/wolof_synth.jsonl
    chat_path: data/chat_synth.json
    default_category: synthetic

training_data:
  - name: aya
    path: data/splits/chat_aya_train.json
    weight: 1.0
  - name: soynade
    path: data/splits/chat_soynade_train.json
    weight: 1.0
  - name: synth
    path: data/splits/chat_synth_train.json
    weight: 1.0

validation_data:
  - name: aya
    path: data/splits/chat_aya_validation.json
  - name: soynade
    path: data/splits/chat_soynade_validation.json
  - name: synth
    path: data/splits/chat_synth_validation.json

eval_data:
  combined_path: data/splits/eval_all.jsonl
  sources:
    - name: aya
      path: data/splits/chat_aya_eval.json
    - name: soynade
      path: data/splits/chat_soynade_eval.json
    - name: synth
      path: data/splits/chat_synth_eval.json
